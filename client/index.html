<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMS — Sistem Informasi Kredit Konsumer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:          '#1a1a1a',
            'ink-2':      '#4a4a4a',
            'ink-3':      '#999999',
            'ink-4':      '#CCCCCC',
            line:         '#E5E5E5',
            'line-strong':'#1a1a1a',
            bg:           '#ffffff',
            'bg-2':       '#f6f6f4',
            'bg-3':       '#FAFAFA',
            accent:       '#1f3b5c',
            'accent-light':'#2d5a8e',
            'accent-bg':  '#e6ecf2',
            success:      '#22C55E',
            'success-bg': '#F0FDF4',
            warn:         '#F97316',
            'warn-bg':    '#FFF7ED',
            danger:       '#EF4444',
            'danger-bg':  '#FEF2F2',
            purple:       '#7C3AED',
            'purple-bg':  '#F5F3FF',
            /* backward-compat */
            primary:      '#1f3b5c',
            'primary-light':'#2d5a8e',
            muted:        '#999999',
            text:         '#1a1a1a',
            border:       '#E5E5E5',
            surface:      '#ffffff',
            warning:      '#F97316',
          },
          fontFamily: {
            display: ['"Open Sans"', 'system-ui', 'sans-serif'],
            body:    ['"Open Sans"', 'system-ui', 'sans-serif'],
            mono:    ['"Open Sans"', 'monospace'],
          },
          borderRadius: {
            'xl': '12px',
            '2xl': '16px',
            '3xl': '24px',
          },
        },
      },
    };
  </script>
  <style>
    html, body, #app { height: 100%; }
    body { font-family: 'Open Sans', system-ui, sans-serif; color: #1a1a1a; }
    .font-mono, code { font-family: 'Open Sans', monospace; }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #F5F5F5;
    }
    ::-webkit-scrollbar-thumb {
      background: #CCCCCC;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #999999;
    }

    /* Responsive utilities */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrap table { min-width: 700px; width: 100%; }
    .hide-mobile { display: revert; }
    .show-mobile { display: none; }

    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }
      .show-mobile { display: revert !important; }
      .stack-mobile { flex-direction: column !important; }
      .stack-mobile > * { width: 100% !important; }

      header > div { padding: 0 12px !important; }
      .main-content { padding: 12px !important; }
      .hide-mobile-header { display: none !important; }

      .login-page { flex-direction: column !important; }
      .login-left { flex: 0 0 auto !important; padding: 20px !important; min-height: 160px; }
      .login-left > div:last-child { gap: 2px !important; }
      .login-left > div:last-child > div:first-child { font-size: 18px !important; }
      .login-right { flex: 1 !important; padding: 24px 20px !important; justify-content: flex-start !important; padding-top: 32px !important; }

      .stat-cards { grid-template-columns: repeat(2, 1fr) !important; }
      .filter-toolbar > * { flex: 1 1 100% !important; }
      .filter-toolbar > div:first-child { flex: 1 1 100% !important; }
      .filter-toolbar select { min-width: 0 !important; width: 100% !important; }

      .tab-content-area { padding: 12px !important; }
      .detail-header { flex-direction: column !important; align-items: flex-start !important; }
      .detail-actions { width: 100% !important; }
      .detail-actions > * { flex: 1 !important; }

      .tab-nav button { flex: 0 0 auto !important; padding: 0 10px !important; font-size: 11px !important; }

      .field-row { flex-direction: column !important; gap: 2px !important; }
      .field-label { width: 100% !important; flex-shrink: 1 !important; }

      .audit-stepper { flex-direction: column !important; align-items: stretch !important; padding: 12px 0 !important; }
      .audit-stepper-step { flex-direction: row !important; align-items: center !important; gap: 12px !important; padding: 4px 0 !important; }
      .audit-stepper-step > div:first-child { flex-shrink: 0 !important; }
      .audit-stepper-step > div:last-child { text-align: left !important; max-width: none !important; margin-top: 0 !important; font-size: 0.8rem !important; }
      .audit-stepper-line { width: 2px !important; height: 24px !important; margin: 0 0 0 17px !important; flex-shrink: 0 !important; }
      .audit-header { display: none !important; }
      .audit-row {
        display: block !important;
        border: 1px solid #E5E7EB !important;
        border-radius: 8px !important;
        padding: 12px !important;
        margin-bottom: 8px !important;
        background: #ffffff !important;
      }
      .audit-row > span { display: block !important; }
      .audit-cell {
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        gap: 8px !important;
        padding: 4px 0 !important;
        border-bottom: none !important;
      }
      .audit-cell::before {
        content: attr(data-label);
        font-size: 0.75rem !important;
        font-weight: 500 !important;
        color: #6B7280 !important;
        flex-shrink: 0 !important;
      }

      /* Loan queue table → cards */
      .table-wrap { overflow: visible !important; }
      .table-wrap table { min-width: 0 !important; border-collapse: collapse !important; }
      .table-wrap thead { display: none !important; }
      .table-wrap tbody, .table-wrap tr { display: block !important; }
      .table-wrap td { display: block !important; }
      .loan-row {
        border: 1px solid #E5E7EB !important;
        border-radius: 10px !important;
        padding: 14px !important;
        margin-bottom: 12px !important;
        background: #ffffff !important;
        border-bottom: 1px solid #E5E7EB !important;
      }
      .table-wrap .loan-cell {
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        gap: 8px !important;
        padding: 6px 0 !important;
        border-bottom: none !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }
      .table-wrap .loan-cell::before {
        content: attr(data-label);
        font-size: 0.75rem !important;
        font-weight: 500 !important;
        color: #6B7280 !important;
        flex-shrink: 0 !important;
      }
      .table-wrap .loan-cell[data-label=""]::before { content: none !important; }
      .table-wrap .loan-cell:last-child {
        justify-content: flex-end !important;
        padding-top: 10px !important;
        border-top: 1px solid #F3F4F6 !important;
        margin-top: 6px !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
