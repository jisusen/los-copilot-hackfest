version: '3.8'

services:
  los-demo:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3333:3333"
    volumes:
      - los-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3333
      - CORS_ORIGIN=*
    healthcheck:
      test: ["CMD", "test", "-f", "/app/data/los.db"]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    volumes:
      - los-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3003
      - LOS_URL=http://los-demo:3333
      - MOCK_AGENT=true
      - DB_PATH=/app/data/los.db
      - CORS_ORIGIN=*
    depends_on:
      - los-demo

volumes:
  los-data:
